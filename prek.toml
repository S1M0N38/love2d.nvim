# Prek configuration for love2d.nvim
# See https://github.com/j178/prek for more information

fail_fast = false
default_stages = ["pre-commit"]

# Built-in Rust hooks (fast, zero-setup)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md,markdown"] },
  { id = "end-of-file-fixer" },
  { id = "check-added-large-files", args = ["--maxkb=500"] },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "detect-private-key" },
  { id = "no-commit-to-branch", args = ["--branch=main", "--branch=master"] },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "fix-byte-order-marker" },
]

# StyLua formatter (requires stylua installed globally)
[[repos]]
repo = "https://github.com/JohnnyMorganz/StyLua"
rev = "v2.1.0"
hooks = [
  { id = "stylua-system" },
]

# Luacheck linter (local hook)
[[repos]]
repo = "local"

[[repos.hooks]]
id = "luacheck"
name = "Luacheck"
language = "system"
entry = "luacheck lua/"
types = ["lua"]
pass_filenames = false

# Conventional commit validation (commit-msg stage)
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v3.1.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"] },
]
